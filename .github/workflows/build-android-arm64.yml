name: Build LiteRT-LM Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 25.2.9519653
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;25.2.9519653"

      - name: Set Android env
        run: |
          echo "ANDROID_SDK_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Repin Rust crate lockfiles
        run: |
          set -eux
          touch src/lib.rs
          CARGO_BAZEL_REPIN=1 bazel sync --only=crate_index
          rm -f src/lib.rs

      - name: Prefetch target dependencies
        run: |
          bazel fetch --config=android_arm64 //runtime/engine:litert_lm_main

      - name: Patch nlohmann_json headers
        run: |
          set -eux
          OUTPUT_BASE="$(bazel info output_base)"
          TO_JSON="$(find "$OUTPUT_BASE/external" -path '*/nlohmann_json*/include/nlohmann/detail/conversions/to_json.hpp' | head -n 1)"
          FROM_JSON="$(find "$OUTPUT_BASE/external" -path '*/nlohmann_json*/include/nlohmann/detail/conversions/from_json.hpp' | head -n 1)"

          echo "TO_JSON=$TO_JSON"
          echo "FROM_JSON=$FROM_JSON"

          test -n "$TO_JSON"
          test -n "$FROM_JSON"
          test -f "$TO_JSON"
          test -f "$FROM_JSON"

          sed -i '0,/#if JSON_HAS_FILESYSTEM || JSON_HAS_EXPERIMENTAL_FILESYSTEM/s//#if 0 \/* disabled for Android NDK filesystem\/char8_t compatibility *\//' "$TO_JSON"
          sed -i '0,/#if JSON_HAS_FILESYSTEM || JSON_HAS_EXPERIMENTAL_FILESYSTEM/s//#if 0 \/* disabled for Android NDK filesystem\/char8_t compatibility *\//' "$FROM_JSON"

          echo "Patched to_json.hpp:"
          grep -n 'JSON_HAS_FILESYSTEM\|JSON_HAS_EXPERIMENTAL_FILESYSTEM\|disabled for Android NDK filesystem' "$TO_JSON" || true

          echo "Patched from_json.hpp:"
          grep -n 'JSON_HAS_FILESYSTEM\|JSON_HAS_EXPERIMENTAL_FILESYSTEM\|disabled for Android NDK filesystem' "$FROM_JSON" || true

      - name: Patch external cxx.h
        run: |
          set -eux
          OUTPUT_BASE="$(bazel info output_base)"
          CXX_H="$(find "$OUTPUT_BASE/external" -path '*/crate_index__cxx-*/include/cxx.h' | head -n 1)"

          echo "CXX_H=$CXX_H"

          test -n "$CXX_H"
          test -f "$CXX_H"

          REAL_CXX_H="$(realpath "$CXX_H")"
          chmod u+w "$REAL_CXX_H" || true

          sed -i '/#include <ranges>/d' "$REAL_CXX_H"
          sed -i '/std::ranges::contiguous_range/d' "$REAL_CXX_H"
          sed -i '/std::contiguous_iterator/d' "$REAL_CXX_H"

          echo "Top of patched cxx.h:"
          sed -n '1,40p' "$REAL_CXX_H" || true

          echo "Remaining ranges lines in cxx.h:"
          grep -n 'ranges' "$REAL_CXX_H" || true

      - name: Build litert_lm_main for Android ARM64
        run: |
          set -eux
          bazel build --config=android_arm64 //runtime/engine:litert_lm_main
      
      - name: Inspect built shared libs
        run: |
          set -eux
          find bazel-bin -type f | grep -E 'GemmaModelConstraintProvider|ConstraintProvider|\.so$' || true
          find bazel-out -type f | grep -E 'GemmaModelConstraintProvider|ConstraintProvider|\.so$' || true
      
       - name: Inspect runfiles and Gemma provider
         run: |
           set -eux

           echo "=== direct search, all file types ==="
           find bazel-bin bazel-out . -name 'libGemmaModelConstraintProvider.so' -print -ls || true

           echo "=== runfiles dirs ==="
           find bazel-bin -name '*.runfiles' -print | head -n 50 || true

           echo "=== grep provider in manifests / symlink trees ==="
           grep -R "GemmaModelConstraintProvider" bazel-bin bazel-out . 2>/dev/null | head -n 100 || true
      
       - name: Collect artifact
         run: |
          set -eux
          mkdir -p out

          cp -f bazel-bin/runtime/engine/litert_lm_main out/

          PROVIDER_SO="$(find bazel-bin bazel-out . -name 'libGemmaModelConstraintProvider.so' | head -n 1 || true)"
          echo "PROVIDER_SO=$PROVIDER_SO"

          if [ -n "$PROVIDER_SO" ]; then
            cp -L "$PROVIDER_SO" out/
          fi

          RUNFILES_DIR="bazel-bin/runtime/engine/litert_lm_main.runfiles"
          if [ -d "$RUNFILES_DIR" ]; then
            mkdir -p out/runfiles
            cp -aL "$RUNFILES_DIR"/. out/runfiles/
          fi

          ls -R out | head -n 200 || true
          ls -lh out
          file out/litert_lm_main || true
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-android-arm64
          path: out/
