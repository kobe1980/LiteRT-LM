name: Build LiteRT-LM Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout upstream LiteRT-LM
        uses: actions/checkout@v4
        with:
          repository: google-ai-edge/LiteRT-LM
          ref: v0.10.1
          lfs: true
          submodules: recursive

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Patch gemma3_data_processor.cc
        run: |
          set -eux
          FILE="runtime/conversation/model_data_processor/gemma3_data_processor.cc"
          sed -i 's/prompt_view.data() - part.size()/prompt_view.data() - start/g' "$FILE"
          grep -n 'text_part' "$FILE" || true

      - name: Patch gemma4_data_processor.cc
        run: |
          set -eux
          FILE="runtime/conversation/model_data_processor/gemma4_data_processor.cc"
          sed -i 's/prompt_view.data() - part.size()/prompt_view.data() - start/g' "$FILE"
          grep -n 'text_part' "$FILE" || true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 25.2.9519653
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;25.2.9519653"

      - name: Set Android env
        run: |
          echo "ANDROID_SDK_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Prefetch target dependencies
        run: bazel fetch --config=android_arm64 //runtime/engine:litert_lm_main

      - name: Patch nlohmann_json headers
        run: |
          set -eux
          OUTPUT_BASE="$(bazel info output_base)"
          TO_JSON="$(find "$OUTPUT_BASE/external" -path '*/nlohmann_json*/include/nlohmann/detail/conversions/to_json.hpp' | head -n 1)"
          FROM_JSON="$(find "$OUTPUT_BASE/external" -path '*/nlohmann_json*/include/nlohmann/detail/conversions/from_json.hpp' | head -n 1)"

          echo "TO_JSON=$TO_JSON"
          echo "FROM_JSON=$FROM_JSON"

          test -n "$TO_JSON"
          test -n "$FROM_JSON"
          test -f "$TO_JSON"
          test -f "$FROM_JSON"

          sed -i '0,/#if JSON_HAS_FILESYSTEM || JSON_HAS_EXPERIMENTAL_FILESYSTEM/s//#if 0 \/* disabled for Android NDK filesystem\/char8_t compatibility *\//' "$TO_JSON"
          sed -i '0,/#if JSON_HAS_FILESYSTEM || JSON_HAS_EXPERIMENTAL_FILESYSTEM/s//#if 0 \/* disabled for Android NDK filesystem\/char8_t compatibility *\//' "$FROM_JSON"

      - name: Patch cxx.h
        run: |
          set -eux
          OUTPUT_BASE="$(bazel info output_base)"
          CXX_H="$(find "$OUTPUT_BASE/external" -path '*/crate_index__cxx-*/include/cxx.h' | head -n 1)"

          echo "CXX_H=$CXX_H"

          test -n "$CXX_H"
          test -f "$CXX_H"

          grep -q '#include <ranges>' "$CXX_H"

          perl -0pi -e 's/\Q#include <ranges>\E/#if __has_include(<ranges>)\n#include <ranges>\n#endif/g' "$CXX_H"
          perl -0pi -e 's/\Qstatic_assert(std::ranges::contiguous_range<rust::Slice<const uint8_t>>);\E/#if __has_include(<ranges>)\nstatic_assert(std::ranges::contiguous_range<rust::Slice<const uint8_t>>);\n#endif/g' "$CXX_H"
          perl -0pi -e 's/\Qstatic_assert(std::contiguous_iterator<rust::Slice<const uint8_t>::iterator>);\E/#if __has_include(<ranges>)\nstatic_assert(std::contiguous_iterator<rust::Slice<const uint8_t>::iterator>);\n#endif/g' "$CXX_H"

      - name: First build pass
        run: |
          set -eux
          bazel build --config=android_arm64 //runtime/engine:litert_lm_main || true

      - name: Patch generated parser files if present
        run: |
          set -eux

          patch_one() {
            f="$1"
            if [ ! -f "$f" ]; then
              echo "Missing $f"
              return 0
            fi

            echo "Patching $f"
            chmod u+w "$f" || true

            sed -i '/#include <ranges>/d' "$f"

            sed -i '/static_assert(std::ranges::contiguous_range<rust::Slice<const uint8_t>>);/d' "$f"

            sed -i '/static_assert(std::contiguous_iterator<rust::Slice<const uint8_t>::iterator>);/d' "$f"

            echo "First lines of $f after patch:"
            head -n 25 "$f" || true
          }

          patch_one "bazel-out/arm64-v8a-opt/bin/runtime/components/tool_use/rust/parsers.rs.h"
          patch_one "bazel-out/arm64-v8a-opt/bin/runtime/components/tool_use/rust/parsers.rs.cc"

      - name: Final build with retry
        run: |
          set -eux

          patch_one() {
            f="$1"
            if [ ! -f "$f" ]; then
              echo "Missing $f"
              return 0
            fi

            echo "Repatching $f"
            chmod u+w "$f" || true

            sed -i '/#include <ranges>/d' "$f"

            sed -i '/static_assert(std::ranges::contiguous_range<rust::Slice<const uint8_t>>);/d' "$f"

            sed -i '/static_assert(std::contiguous_iterator<rust::Slice<const uint8_t>::iterator>);/d' "$f"

            echo "First lines of $f after repatch:"
            head -n 25 "$f" || true
          }

          if bazel build --config=android_arm64 //runtime/engine:litert_lm_main; then
            exit 0
          fi

          echo "Final build failed, retrying after parser file patch"

          patch_one "bazel-out/arm64-v8a-opt/bin/runtime/components/tool_use/rust/parsers.rs.h"
          patch_one "bazel-out/arm64-v8a-opt/bin/runtime/components/tool_use/rust/parsers.rs.cc"

          bazel build --config=android_arm64 //runtime/engine:litert_lm_main

      - name: Collect artifact
        run: |
          mkdir -p out
          cp -f bazel-bin/runtime/engine/litert_lm_main out/litert_lm_main
          ls -lh out
          file out/litert_lm_main || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-android-arm64
          path: out/litert_lm_main
