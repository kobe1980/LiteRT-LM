name: Build LiteRT-LM Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout upstream LiteRT-LM
        uses: actions/checkout@v4
        with:
          repository: google-ai-edge/LiteRT-LM
          ref: v0.10.1
          lfs: true
          submodules: recursive

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 25.2.9519653
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;25.2.9519653"

      - name: Set Android env
        run: |
          echo "ANDROID_SDK_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Prefetch external dependencies
        run: |
          bazel sync --configure

      - name: Locate and patch nlohmann_json headers
        run: |
          set -eux

          OUTPUT_BASE="$(bazel info output_base)"

          TO_JSON="$(find "$OUTPUT_BASE/external" -path '*/nlohmann*/include/nlohmann/detail/conversions/to_json.hpp' | head -n 1)"
          FROM_JSON="$(find "$OUTPUT_BASE/external" -path '*/nlohmann*/include/nlohmann/detail/conversions/from_json.hpp' | head -n 1)"

          echo "TO_JSON=$TO_JSON"
          echo "FROM_JSON=$FROM_JSON"

          test -n "$TO_JSON"
          test -n "$FROM_JSON"
          test -f "$TO_JSON"
          test -f "$FROM_JSON"

          python3 - "$TO_JSON" "$FROM_JSON" <<'PY'
          import sys
          from pathlib import Path

          for raw in sys.argv[1:]:
              path = Path(raw)
              text = path.read_text()
              text = text.replace(
                  "#if JSON_HAS_FILESYSTEM || JSON_HAS_EXPERIMENTAL_FILESYSTEM",
                  "#if 0 /* disabled for Android NDK filesystem/char8_t compatibility */"
              )
              path.write_text(text)
              print(f"patched {path}")
          PY

          grep -n "#if 0" "$TO_JSON" | head
          grep -n "#if 0" "$FROM_JSON" | head

      - name: Build litert_lm_main for Android ARM64
        run: |
          bazel build \
            --config=android_arm64 \
            //runtime/engine:litert_lm_main

      - name: Collect artifact
        run: |
          mkdir -p out
          cp -f bazel-bin/runtime/engine/litert_lm_main out/litert_lm_main
          ls -lh out
          file out/litert_lm_main || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-android-arm64
          path: out/litert_lm_main
