name: Build LiteRT-LM Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 25.2.9519653
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;25.2.9519653"

      - name: Set Android env
        run: |
          echo "ANDROID_SDK_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Repin Rust crate lockfiles
        run: |
          set -eux
          touch src/lib.rs
          CARGO_BAZEL_REPIN=1 bazel sync --only=crate_index
          rm -f src/lib.rs

      - name: Build litert_lm_main for Android ARM64
        run: |
          set -eux
          bazel build --config=android_arm64 //runtime/engine:litert_lm_main

      - name: Collect artifact
        run: |
          mkdir -p out
          cp -f bazel-bin/runtime/engine/litert_lm_main out/litert_lm_main
          ls -lh out
          file out/litert_lm_main || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-android-arm64
          path: out/litert_lm_main
