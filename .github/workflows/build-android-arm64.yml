name: Build LiteRT-LM Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout upstream LiteRT-LM
        uses: actions/checkout@v4
        with:
          repository: google-ai-edge/LiteRT-LM
          ref: v0.10.1
          lfs: true
          submodules: recursive

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Patch gemma3_data_processor.cc
        run: |
          set -eux
          FILE="runtime/conversation/model_data_processor/gemma3_data_processor.cc"
          sed -i 's/prompt_view.data() - part.size()/prompt_view.data() - start/g' "$FILE"

      - name: Patch gemma4_data_processor.cc
        run: |
          set -eux
          FILE="runtime/conversation/model_data_processor/gemma4_data_processor.cc"
          sed -i 's/prompt_view.data() - part.size()/prompt_view.data() - start/g' "$FILE"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 25.2.9519653
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;25.2.9519653"

      - name: Set Android env
        run: |
          echo "ANDROID_SDK_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Prefetch target dependencies
        run: |
          bazel fetch --config=android_arm64 //runtime/engine:litert_lm_main

      - name: Patch nlohmann_json headers
        run: |
          set -eux
          OUTPUT_BASE="$(bazel info output_base)"
          TO_JSON="$(find "$OUTPUT_BASE/external" -path '*/nlohmann_json*/include/nlohmann/detail/conversions/to_json.hpp' | head -n 1)"
          FROM_JSON="$(find "$OUTPUT_BASE/external" -path '*/nlohmann_json*/include/nlohmann/detail/conversions/from_json.hpp' | head -n 1)"

          test -n "$TO_JSON"
          test -n "$FROM_JSON"
          test -f "$TO_JSON"
          test -f "$FROM_JSON"

          sed -i '0,/#if JSON_HAS_FILESYSTEM || JSON_HAS_EXPERIMENTAL_FILESYSTEM/s//#if 0 \/* disabled for Android NDK filesystem\/char8_t compatibility *\//' "$TO_JSON"
          sed -i '0,/#if JSON_HAS_FILESYSTEM || JSON_HAS_EXPERIMENTAL_FILESYSTEM/s//#if 0 \/* disabled for Android NDK filesystem\/char8_t compatibility *\//' "$FROM_JSON"

      - name: Patch cxx.h
        run: |
          set -eux
          OUTPUT_BASE="$(bazel info output_base)"
          CXX_H="$(find "$OUTPUT_BASE/external" -path '*/crate_index__cxx-*/include/cxx.h' | head -n 1)"

          test -n "$CXX_H"
          test -f "$CXX_H"

          REAL_CXX_H="$(realpath "$CXX_H")"

          sed -i '/#include <ranges>/d' "$REAL_CXX_H"
          sed -i '/std::ranges::contiguous_range/d' "$REAL_CXX_H"
          sed -i '/std::contiguous_iterator/d' "$REAL_CXX_H"

      - name: Generate parser files
        run: |
          set -eux
          bazel build --config=android_arm64 //runtime/components/tool_use/rust:parsers_cpp || true

      - name: Patch generated parser files
        run: |
          set -eux

          HFILE="bazel-out/arm64-v8a-opt/bin/runtime/components/tool_use/rust/parsers.rs.h"
          CFILE="bazel-out/arm64-v8a-opt/bin/runtime/components/tool_use/rust/parsers.rs.cc"

          if [ -f "$HFILE" ]; then
            REAL_HFILE="$(realpath "$HFILE")"
            chmod u+w "$REAL_HFILE" || true
            sed -i '/#include <ranges>/d' "$REAL_HFILE"
            sed -i '/std::ranges::contiguous_range/d' "$REAL_HFILE"
            sed -i '/std::contiguous_iterator/d' "$REAL_HFILE"
            echo "Top of $REAL_HFILE"
            sed -n '1,30p' "$REAL_HFILE" || true
            echo "Remaining ranges lines in $REAL_HFILE"
            grep -n 'ranges' "$REAL_HFILE" || true
          else
            echo "Missing $HFILE"
            exit 1
          fi

          if [ -f "$CFILE" ]; then
            REAL_CFILE="$(realpath "$CFILE")"
            chmod u+w "$REAL_CFILE" || true
            sed -i '/#include <ranges>/d' "$REAL_CFILE"
            sed -i '/std::ranges::contiguous_range/d' "$REAL_CFILE"
            sed -i '/std::contiguous_iterator/d' "$REAL_CFILE"
            echo "Top of $REAL_CFILE"
            sed -n '1,30p' "$REAL_CFILE" || true
            echo "Remaining ranges lines in $REAL_CFILE"
            grep -n 'ranges' "$REAL_CFILE" || true
          else
            echo "Missing $CFILE"
            exit 1
          fi

      - name: Final build
        run: |
          set -eux
          bazel build --config=android_arm64 //runtime/engine:litert_lm_main

      - name: Collect artifact
        run: |
          mkdir -p out
          cp -f bazel-bin/runtime/engine/litert_lm_main out/litert_lm_main
          ls -lh out
          file out/litert_lm_main || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-android-arm64
          path: out/litert_lm_main
